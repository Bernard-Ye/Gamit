name: Download Files

on:
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨2点运行

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Docker
        uses: docker/setup-buildx-action@v1

      - name: Build and run Docker container
        run: |
          # 创建 Dockerfile
          echo "
          FROM ubuntu:latest
          RUN apt-get update && apt-get install -y wget
          COPY download_files.sh /download_files.sh
          RUN chmod +x /download_files.sh
          CMD [\"/download_files.sh\"]
          " > Dockerfile

          # 构建 Docker 镜像
          docker build -t download-script .

          # 运行 Docker 容器并将本地目录挂载到容器中
          docker run -v ${{ github.workspace }}:/local_directory download-script
